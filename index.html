<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Speed Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <h1>Reaction Speed Tester</h1>
            <p>Tap the square as soon as it turns green. Keep your focus and beat your best time.</p>
        </header>

        <main id="container">
            <section class="panel">
                <div class="status-row">
                    <div class="status-pill" id="prompt">Press Start to begin</div>
                    <div class="status-pill" id="bestTime">Best: —</div>
                </div>
                <button id="startBtn" class="primary-btn">Start Test</button>
                <div id="box" role="button" aria-label="Reaction target"></div>
                <p id="result" aria-live="polite"></p>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
