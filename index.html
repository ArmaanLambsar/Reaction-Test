<!DOCTYPE html>
<html>
<head>
    <title>Reaction Speed Tester</title>
    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 40px;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        #container {
            margin: 40px auto;
            width: 350px;
            padding: 25px;
            background: #2f2f48;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }

        #box {
            width: 250px;
            height: 250px;
            background: #ff4d4d;
            margin: 25px auto;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        #box:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #startBtn:hover {
            background: #3358cc;
            transform: scale(1.05);
        }

        #result {
            font-size: 1.3rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    
    <h1>Reaction Speed Tester</h1>
        
    <div id="container">
        <button id="startBtn">Start Test</button>
        <div id="box"></div>
        <p id="result"></p>
    </div>

    <script>
        let startTime;
        let gameActive = false;

        const box = document.getElementById("box");
        const result = document.getElementById("result");
        const startBtn = document.getElementById("startBtn");

        function makeGreen() {
            box.style.background = "#4dff4d";
            startTime = Date.now();
            gameActive = true;
        }

        function startGame() {
            result.innerText = "";
            box.style.background = "#ff4d4d";
            gameActive = false;

            const randomDelay = Math.random() * 3000 + 1000;
            setTimeout(makeGreen, randomDelay);
        }

        box.addEventListener("click", () => {
            if (gameActive) {
                const reactionTime = Date.now() - startTime;
                result.innerText = 'Your reaction time: ${reactionTime} ms';
                gameActive = false;
            } else {
                result.innerText = "Too early! Wait for Green.";
            }
        });

        startBtn.addEventListener("click", startGame);
    </script>

</body>
</html>
